# =============================================================================
# Tesseract — FULL Base Config (reference / example)
# =============================================================================
# Tesseract works DIFFERENTLY from the other engines in this project: it
# has no Python-level parameter list to introspect (unlike EasyOCR's
# Reader.__init__ or doctr's ocr_predictor()). Instead, Tesseract exposes
# its behavior through:
#   1. A handful of CLI flags (--psm, --oem, --dpi, -l) handled by
#      build_tesseract_config() in run_tesseract.py.
#   2. Hundreds of internal "config variables" set via `-c VAR=VALUE`
#      (see `tesseract --print-parameters` — 629 of them in this install).
#      These ALREADY work without any code change: anything you put under
#      extra_params below is passed straight through.
#   3. A few Python-only parameters on pytesseract.image_to_data() itself
#      (timeout, nice) that are NOT Tesseract config variables.
#
# This file lists the PRACTICALLY USEFUL options from all three layers —
# not all 629 internal variables (most are debug/internal and irrelevant
# for OCR accuracy comparison work).
# =============================================================================

model_name: "tesseract_full_reference"

ocr_settings:
  # ---------------------------------------------------------------------
  # CLI flags — handled specially in build_tesseract_config()
  # ---------------------------------------------------------------------
  lang: "tur+eng"
  # Single language: "tur" | "eng" | Multiple: "tur+eng"

  psm: 6
  # Page Segmentation Mode (0-13):
  #   0  = Orientation/script detection (OSD) only
  #   1  = Automatic page segmentation with OSD
  #   3  = Fully automatic segmentation, no OSD (Tesseract's own default)
  #   4  = Single column of variable-sized text
  #   6  = Single uniform block of text (good for dense text/receipts)
  #   7  = Treat image as a single text line
  #   8  = Treat image as a single word
  #   10 = Treat image as a single character
  #   11 = Sparse text, order doesn't matter
  #   13 = Raw line, language-specific hacks disabled

  oem: 3
  # OCR Engine Mode (0-3):
  #   0 = Legacy engine only
  #   1 = LSTM (neural net) engine only
  #   2 = Legacy + LSTM combined
  #   3 = Automatically pick whichever is available (recommended default)

  dpi: 300
  # Image resolution hint (300-400 generally gives good results)

  # ---------------------------------------------------------------------
  # pytesseract.image_to_data() Python-level parameters — NOT Tesseract
  # -c variables, these are handled directly in run_tesseract.py
  # ---------------------------------------------------------------------
  timeout: 0
  # (seconds, default 0 = no limit) If Tesseract takes longer than this
  # for a single image, pytesseract raises an error — run_tesseract.py
  # catches this and re-raises with a clear message, which main.py's
  # error-tolerance mechanism then reports and skips, continuing with the
  # rest of the batch. Useful as a safety valve against very large/complex
  # images hanging the pipeline.

  # ---------------------------------------------------------------------
  # extra_params — ALREADY supports any of Tesseract's ~629 -c VAR=VALUE
  # config variables (see `tesseract --print-parameters` for the full
  # list). The ones below are the practically useful subset for OCR
  # accuracy/layout tuning — add/remove freely, no code change needed.
  # ---------------------------------------------------------------------
  extra_params:
    # --- Spacing / formatting ---
    preserve_interword_spaces: 1
    # Preserve extra spaces between words (0/1)

    # --- Character restriction (useful for known fixed-format fields) ---
    tessedit_char_whitelist: ""
    # Only recognize these characters, e.g. "0123456789" for a pure
    # numeric field (amount, date). Empty = no restriction.

    tessedit_char_blacklist: ""
    # NEVER recognize these characters, e.g. "|~`". Empty = no restriction.

    tessedit_char_unblacklist: ""
    # Overrides tessedit_char_blacklist for specific characters.

    # --- Performance ---
    tessedit_parallelize: 0
    # Run in parallel where possible (0/1)

    # --- Page / line behavior ---
    include_page_breaks: 0
    # Insert page break markers in multi-page output (0/1)

    user_defined_dpi: 0
    # Explicit DPI override if the image doesn't embed DPI metadata and
    # you want to silence Tesseract's "no DPI" warning. 0 = not set.

    # --- Noise / cleanup (useful for scanned/photographed documents) ---
    textord_heavy_nr: 0
    # Vigorously remove noise — try 1 for noisy/scanned receipts.

    # --- Output post-processing ---
    tessedit_fix_fuzzy_spaces: 1
    # Try to improve uncertain/fuzzy spacing between words (0/1)

    tessedit_fix_hyphens: 1
    # Try to merge words split by a hyphen at a line break (0/1)

    # --- Numeric-only mode (useful for amount/date fields) ---
    classify_bln_numeric_mode: 0
    # Assume the input is digits only [0-9] — set to 1 for a field you
    # KNOW only contains numbers, can meaningfully improve accuracy there.

    # !!! tessedit_do_invert is DEPRECATED as of this Tesseract version —
    # the engine itself warns it will be removed in release 6. Use
    # invert_threshold instead (see below) if you need inverted-image
    # retry behavior (e.g. light text on a dark background).
    # invert_threshold: 0.7
    # For lines with a mean confidence below this value, Tesseract also
    # tries OCR on an inverted version of the image. (float, default 0.7)

# =============================================================================
# preprocessing — shared schema across all 6 engines (see _common.py)
# All steps default to false/disabled — enabling preprocessing here does
# NOT guarantee improved accuracy, it should be measured against real data.
# Tesseract, being a classical (non-deep-learning) engine, tends to
# benefit the most from preprocessing among all 6 engines — see our
# earlier real-document test where grayscale+threshold improved
# confidence on a noisy/shadowed receipt image.
# =============================================================================
preprocessing:
  resize: false
  resize_scale: 2.0

  deskew: false

  autocrop_border: false
  autocrop_margin_ratio: 0.01

  illumination_correct: false
  illumination_kernel_size: 51

  grayscale: false

  clahe: false
  clahe_clip_limit: 2.0
  clahe_grid_size: 8

  denoise: false

  sharpen: false

  morphology: false
  morphology_op: "dilate"
  morphology_kernel_size: 2

  threshold: false
  threshold_block_size: 35
  threshold_c: 11