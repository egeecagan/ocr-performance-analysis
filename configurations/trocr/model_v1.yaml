# =============================================================================
# TrOCR Config
# =============================================================================
# ocr_settings: model/processor oluşturmak için ayarlar.
#   model_name değiştiğinde modelin YENİDEN yüklenmesi gerekir —
#   load_time_seconds bu yüzden gerçek bir maliyet olarak ölçülür.
#
#   gpu: "auto" (varsayılan) -> GPU varsa otomatik kullanılır.
#        true/false yazarsanız zorlama olarak kullanılır.
#
# generate_settings: model.generate() çağrısına geçirilen serbest
#   parametreler (örn. max_length, num_beams). filter_valid_kwargs()
#   generate **kwargs kabul ettiği için pratikte hepsini geçirir.
#
# preprocessing: diğer 3 motor config'iyle BİREBİR aynı şema, aynı ortak
#   _common.preprocess_image() fonksiyonunu kullanır.
#
# NOT: TrOCR tek satırlık metin için tasarlanmış bir modeldir. Ehliyet/
# dekont gibi çok bölgeli, karmaşık layout'lu belgelerde performansı
# preprocessing'den bağımsız olarak sınırlı olabilir — bu farklı bir konu,
# preprocessing ile çözülmez.
# =============================================================================

model_name: "trocr_v1"

ocr_settings:
  model_name: "microsoft/trocr-base-handwritten"
  gpu: "auto"
  font_path: null          # opsiyonel, masked görselde kullanılacak font
  font_size: 24

generate_settings:
  max_length: 64            # üretilecek maksimum token sayısı
  num_beams: 1               # 1: greedy (hızlı) | >1: beam search (daha doğru, daha yavaş)

preprocessing:
  resize: false
  resize_scale: 2.0

  deskew: false

  autocrop_border: false
  autocrop_margin_ratio: 0.01

  illumination_correct: false
  illumination_kernel_size: 51

  grayscale: false

  clahe: false
  clahe_clip_limit: 2.0
  clahe_grid_size: 8

  denoise: false

  sharpen: false

  morphology: false
  morphology_op: "dilate"
  morphology_kernel_size: 2

  threshold: false
  threshold_block_size: 35
  threshold_c: 11