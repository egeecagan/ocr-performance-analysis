model_name: v6
ocr_settings:
  lang_type: tr
  model_selection:
    Det:
      model_type: small
    Rec:
      model_type: small
  advanced_settings:
    Global:
      text_score: 0.5
      max_side_len: 2000
    Det:
      thresh: 0.3
      box_thresh: 0.5
  call_settings:
    use_det: true
    use_cls: true
    use_rec: true
preprocessing:
  resize: false
  resize_scale: 2
  deskew: false
  autocrop_border: false
  autocrop_margin_ratio: 0.01
  illumination_correct: false
  illumination_kernel_size: 51
  grayscale: false
  clahe: false
  clahe_clip_limit: 2
  clahe_grid_size: 8
  denoise: false
  sharpen: false
  morphology: false
  morphology_op: dilate
  morphology_kernel_size: 2
  threshold: false
  threshold_block_size: 35
  threshold_c: 11
