# =============================================================================
# RapidOCR — FULL Base Config (reference / example)
# =============================================================================
# RapidOCR exposes its behavior through THREE distinct layers, each
# handled differently in run_rapidocr.py:
#
#   1. model_selection — WHICH model files to load (Det/Cls/Rec, each can
#      pick model_type or a custom model_path). Consumed ONCE, when the
#      engine is constructed.
#   2. advanced_settings — HOW those models behave (thresholds, size
#      limits). Also consumed ONCE, at construction time, via the same
#      RapidOCR(params={...}) mechanism as model_selection.
#   3. call_settings — runtime flags passed to engine(image, ...) on
#      EVERY image (e.g. turning detection/classification/recognition on
#      or off for a single call). This is the equivalent of EasyOCR's
#      readtext_settings.
#
# NOTE: EngineConfig (ONNX Runtime/OpenVINO/Paddle/Torch/TensorRT thread
# and GPU settings) is intentionally NOT covered here — this project only
# uses the default ONNX Runtime CPU backend, and the other four backends'
# settings (TensorRT GPU shape profiles, NPU memory limits, etc.) are
# irrelevant to a "runs on old/low-spec hardware" setup. If you need
# thread-count tuning for ONNX Runtime specifically, ask for it to be
# added — it's a small, practical addition (EngineConfig.onnxruntime.
# intra_op_num_threads / inter_op_num_threads).
# =============================================================================

model_name: "rapidocr_full_reference"

ocr_settings:
  lang_type: "tr"
  # PP-OCRv6 language code: "tr" | "en" | "ch" | ... (see RapidOCR's docs
  # for the full list — Turkish is supported directly as "tr", not via a
  # generic "latin" category).

  font_path: null
  # Optional, used by resolve_font_path() for the masked visualization.

  # ---------------------------------------------------------------------
  # model_selection — which Det/Cls/Rec model files to load
  # ---------------------------------------------------------------------
  model_selection:
    Det:
      model_type: "small"
      # tiny | small | mobile | medium | server
      # model_path: "/full/path/to/your_det_model.onnx"  # overrides model_type if set
    Cls:
      model_type: "mobile"
      # RapidOCR currently only ships a "mobile" size for the
      # classification (orientation) model.
      # model_path: "/full/path/to/your_cls_model.onnx"
    Rec:
      model_type: "small"
      # tiny | small | medium
      # model_path: "/full/path/to/your_rec_model.onnx"

  # ---------------------------------------------------------------------
  # advanced_settings — threshold/limit tuning, consumed ONCE at
  # construction time (same mechanism as model_selection). Any key you
  # write here is passed straight through as "Module.key" to RapidOCR —
  # only the PRACTICALLY USEFUL ones are listed below as a reference;
  # add/remove freely.
  # ---------------------------------------------------------------------
  advanced_settings:
    Global:
      text_score: 0.5
      # (default 0.5) Minimum overall confidence score for a result to be
      # kept. Lower = more permissive (catches more text, more false
      # positives); higher = stricter.

      min_height: 30
      # (default 30) Minimum image height (pixels) RapidOCR will process
      # without upscaling internally.

      width_height_ratio: 8
      # (default 8) Used to decide whether an image looks like a single
      # text line vs. a full document, affecting internal preprocessing.

      max_side_len: 2000
      # (default 2000) Images larger than this (on the longest side) are
      # downscaled before detection — relevant for very high-resolution
      # scans on low-spec hardware (smaller = faster, less memory, but
      # may lose detail on small text).

      min_side_len: 30
      # (default 30) Images smaller than this are upscaled before detection.

    Det:
      thresh: 0.3
      # (default 0.3) Pixel-level binarization threshold for the text
      # detection heatmap — lower catches fainter text, but more noise.

      box_thresh: 0.5
      # (default 0.5) Confidence threshold for keeping a detected text
      # box. Lower = more boxes kept (more recall, more false positives).

      max_candidates: 1000
      # (default 1000) Maximum number of text box candidates considered
      # per image — relevant for very dense documents.

      unclip_ratio: 1.6
      # (default 1.6) How much to expand detected text boxes outward —
      # higher values give more padding around text, useful if text is
      # being clipped at the edges of boxes.

      limit_side_len: 736
      # (default 736) Detection model's internal resize target — larger
      # values can improve accuracy on small text but cost more compute
      # (relevant trade-off for "old hardware" scenarios).

      limit_type: "min"
      # (default "min") How limit_side_len is applied: resize so the
      # shorter ("min") or longer ("max") side matches the limit.

      use_dilation: true
      # (default true) Apply morphological dilation to detected text
      # regions — can help merge nearby characters into one box.

    Cls:
      cls_thresh: 0.9
      # (default 0.9) Confidence threshold for accepting the
      # orientation classification (0° vs 180°) result.

      cls_batch_num: 6
      # (default 6) Batch size for the classification step — larger is
      # faster per-image throughput but uses more memory at once.

    Rec:
      rec_batch_num: 6
      # (default 6) Batch size for the recognition step — same
      # speed/memory trade-off as cls_batch_num.

  # ---------------------------------------------------------------------
  # call_settings — runtime flags passed to engine(image, ...) on EVERY
  # image call (the equivalent of EasyOCR's readtext_settings). Filtered
  # through filter_valid_kwargs against RapidOCR.__call__'s real
  # signature, so any key it doesn't recognize is silently ignored.
  # ---------------------------------------------------------------------

# NOTE: call_settings lives at the TOP LEVEL of the file (same level as
# preprocessing), NOT nested under ocr_settings — see below.

call_settings:
  use_det: true
  # (default: model's own setting) Enable/disable the detection step for
  # this call. Set false only if you already know the image is a single
  # cropped text line (skips detection entirely, faster).

  use_cls: true
  # Enable/disable the orientation classification step for this call.

  use_rec: true
  # Enable/disable the recognition step for this call. Set false if you
  # only want bounding boxes (text detection only, no character reading).

  return_word_box: false
  # (default false) Return per-WORD bounding boxes within each detected
  # line, not just per-line boxes — useful if you need finer-grained
  # positions (e.g. for a word-level confidence overlay tool).

  return_single_char_box: false
  # (default false) Return per-CHARACTER bounding boxes — even finer
  # grained than return_word_box, at a higher computational cost.

  text_score: 0.5
  # Same meaning as advanced_settings.Global.text_score above, but
  # overridable PER CALL without rebuilding the engine.

  box_thresh: 0.5
  # Same meaning as advanced_settings.Det.box_thresh above, but
  # overridable per call.

  unclip_ratio: 1.6
  # Same meaning as advanced_settings.Det.unclip_ratio above, but
  # overridable per call.

# =============================================================================
# preprocessing — shared schema across all 6 engines (see _common.py)
# All steps default to false/disabled — enabling preprocessing here does
# NOT guarantee improved accuracy, it should be measured against real data.
# =============================================================================
preprocessing:
  resize: false
  resize_scale: 2.0

  deskew: false

  autocrop_border: false
  autocrop_margin_ratio: 0.01

  illumination_correct: false
  illumination_kernel_size: 51

  grayscale: false

  clahe: false
  clahe_clip_limit: 2.0
  clahe_grid_size: 8

  denoise: false

  sharpen: false

  morphology: false
  morphology_op: "dilate"
  morphology_kernel_size: 2

  threshold: false
  threshold_block_size: 35
  threshold_c: 11