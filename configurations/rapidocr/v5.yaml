model_name: v5
ocr_settings:
  lang_type: tr
  model_selection:
    Det:
      model_type: small
    Rec:
      model_type: small
preprocessing:
  resize: true
  resize_scale: 2
  deskew: true
  autocrop_border: true
  autocrop_margin_ratio: 0.01
  illumination_correct: true
  illumination_kernel_size: 51
  grayscale: true
  clahe: true
  clahe_clip_limit: 2
  clahe_grid_size: 8
  denoise: true
  sharpen: false
  morphology: false
  morphology_op: dilate
  morphology_kernel_size: 2
  threshold: false
  threshold_block_size: 35
  threshold_c: 11
